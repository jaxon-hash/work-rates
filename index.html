<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jxnn. | Video Editor</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* Center hero */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero h1 {
    font-size: 3rem;
    margin: 0;
}

.hero p {
    color: #aaa;
    margin-top: 10px;
}

/* button */
.button {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 20px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    transition: 0.2s;
}

.button:hover {
    opacity: 0.8;
}

/* scroll section */
section {
    padding: 80px 20px;
    display: flex;
    justify-content: center;
}

.container {
    max-width: 600px;
    width: 100%;
}

/* card */
.card {
    background: #181818;
    border: 1px solid #2a2a2a;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
}

.client {
    margin-top: 15px;
    padding: 15px;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    background: #121212;
}

.client a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.client a:hover {
    text-decoration: underline;
}

/* small text */
.small {
    color: #777;
    font-size: 0.9rem;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>jxnn.</h1>
        <p>Video Editor • Shorts • YouTube • TikTok</p>

        <a class="button" href="#work">See My Work</a>
    </div>
</div>

<!-- WORK SECTION -->
<section id="work">
    <div class="container">

        <div class="card">
            <h2>🏆 Who I've Worked With</h2>
            <p class="small">A small selection of creators I’ve edited for</p>

            <!-- OKHARRY -->
            <div class="client">
                <p>Worked with</p>
                <a href="https://www.youtube.com/@okharry" target="_blank">
                    OKHarry (YouTube)
                </a>
            </div>

            <div class="small">
                More creators coming soon...
            </div>

            <a class="button" href="https://discord.gg/dUQGtpwSe" target="_blank">
                Contact Me on Discord
            </a>
        </div>

    </div>
</section>

</body>
</html>
