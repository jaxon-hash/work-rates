<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jxnn | Video Editing</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f11;
            color: #f3f4f6;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
        }

        /* Hero Section */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 5%;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.2;
            background: linear-gradient(45deg, #fff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 3rem;
            max-width: 600px;
        }

        /* Services Grid */
        .services {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 4rem;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .service-card {
            background: #18181c;
            border: 1px solid #27272a;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            min-width: 160px;
            flex: 1;
            max-width: 220px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: #52525b;
        }

        .service-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        /* Contact Button */
        .cta-btn {
            display: inline-block;
            background-color: #fff;
            color: #000;
            text-decoration: none;
            padding: 1rem 2.5rem;
            font-weight: 600;
            border-radius: 30px;
            font-size: 1.1rem;
            transition: opacity 0.2s, transform 0.2s;
        }

        .cta-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #52525b;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .services { flex-direction: column; align-items: center; }
            .service-card { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">jxnn</div>
    </header>

    <main>
        <h1>High-level video editing for creators.</h1>
        <p class="subtitle">I turn raw footage into engaging, retention-focused content designed to grow your audience.</p>
        
        <div class="services">
            <div class="service-card">
                <h3>YouTube</h3>
            </div>
            <div class="service-card">
                <h3>Shorts</h3>
            </div>
            <div class="service-card">
                <h3>TikToks</h3>
            </div>
        </div>

        <a href="mailto:youremail@example.com" class="cta-btn">Get In Touch</a>
    </main>

    <footer>
        <p>&copy; 2026 jxnn. All rights reserved.</p>
    </footer>

</body>
</html>
