<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaxon | Video Editor</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container {
    max-width: 900px;
    width: 100%;
}

.header {
    text-align: center;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 3rem;
    margin: 0;
}

.header p {
    color: #aaa;
}

.card {
    background: #151515;
    border: 1px solid #2a2a2a;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
}

h2 {
    margin-top: 0;
}

/* Pricing */
.price {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #222;
    color: #ccc;
}

/* Button */
.button {
    display: block;
    text-align: center;
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 15px;
}

/* Portfolio grid */
.portfolio {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.video {
    background: #111;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
}

.video iframe {
    width: 100%;
    height: 180px;
    border: none;
}

.small {
    color: #888;
    font-size: 0.9rem;
    margin-top: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Jaxon</h1>
        <p>Video Editor • Shorts • YouTube • TikTok</p>
    </div>

    <!-- PRICING -->
    <div class="card">
        <h2>💰 Pricing</h2>

        <div class="price"><span>Shorts (15–60s)</span><span>£10–£25</span></div>
        <div class="price"><span>YouTube Edit</span><span>£30–£80</span></div>
        <div class="price"><span>Rush Delivery</span><span>+50%</span></div>

        <a class="button" href="https://discord.com" target="_blank">Contact Me</a>
    </div>

    <!-- PORTFOLIO -->
    <div class="card">
        <h2>🎬 Portfolio</h2>

        <div class="portfolio">

            <!-- YouTube embed -->
            <div class="video">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>

            <!-- Add more videos by replacing the link -->
            <div class="video">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>

            <div class="video">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>

        </div>

        <div class="small">Replace these links with your actual edits</div>
    </div>

</div>

</body>
</html>
