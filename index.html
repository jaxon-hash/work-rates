<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaxon | Video Editor</title>
    <!-- Font Awesome Kit for clean, modern social logos -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Profile Container Card */
        .card {
            max-width: 450px;
            width: 100%;
            background: #181818;
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: #b5b5b5;
            line-height: 1.6;
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        /* Buttons styling */
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px; /* Space between logo and text */
            width: 100%;
            text-decoration: none;
            background: white;
            color: black;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: transform 0.2s, opacity 0.2s, border-color 0.2s, background-color 0.2s;
            border: 1px solid transparent;
        }

        .button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        /* Secondary Style Button (Discord / Socials) */
        .secondary {
            background: transparent;
            color: white;
            border: 1px solid #3a3a3a;
        }

        .secondary:hover {
            background: #222;
            border-color: #555;
        }

        /* Row setup to split Instagram and X side-by-side */
        .social-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .social-row .button {
            flex: 1;
        }

        /* Footer text styling */
        footer {
            margin-top: 35px;
            color: #666;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Jaxon</h1>

        <p>
            Video Editor specialising in YouTube videos, 
            Shorts and TikTok content.
        </p>

        <!-- Main Rates Button -->
        <a class="button" href="https://ibb.co/XZD7k6g7" target="_blank">
            View My Rates
        </a>

        <!-- Main Discord Contact Button -->
        <a class="button secondary" href="https://discord.gg/dUQGtpwSe" target="_blank">
            <i class="fa-brands fa-discord"></i> Contact Me
        </a>

        <!-- Side-by-Side Instagram & X Links -->
        <div class="social-row">
            <a class="button secondary" href="https://instagram.com/jaxongarforth1" target="_blank">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a class="button secondary" href="https://x.com/jxnn122" target="_blank">
                <i class="fa-brands fa-x-twitter"></i> X / Twitter
            </a>
        </div>

        <footer>
            Fast turnaround • Quality edits • Reliable communication
        </footer>
    </div>
</body>
</html>
