<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaxon | Video Editor</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;

    justify-content: center;
    padding: 40px;
}

.container {
    max-width: 700px;
    width: 100%;
}

.header {
    text-align: center;
    margin-bottom: 40px;

.header p {

}

.card {
    background: #151515;
    border: 1px solid #2a2a2a;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
}

h2 {
    margin-top: 0;
}

.price {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #222;
    color: #ccc;
}

.button {
    display: block;
    text-align: center;
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 15px;
}

.button:hover {

.small {

    font-size: 0.9rem;

<body>

<div class="container">
