<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jxnn. | Video Editor</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #150505 50%, #300505 100%);
            background-size: 100% 200%;
            background-position: var(--scroll-pos, 0% 0%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            animation: breatheBackground 12s ease-in-out infinite alternate;
            transition: background-position 0.2s ease-out;
            position: relative;
        }

        @keyframes breatheBackground {
            0% { background-size: 100% 180%; }
            100% { background-size: 100% 220%; }
        }

        /* --- Particle System Styles --- */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            background: rgba(239, 68, 68, 0.4);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
            animation: floatUp var(--speed) linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: var(--opacity);
            }
            90% {
                opacity: var(--opacity);
            }
            100% {
                transform: translateY(-110vh) translateX(var(--drift));
                opacity: 0;
            }
        }

        .card, .portfolio-section {
            position: relative;
            z-index: 1;
        }

        /* Main Profile Container Card */
        .card {
            max-width: 450px;
            width: 100%;
            background: rgba(24, 24, 24, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: #b5b5b5;
            line-height: 1.6;
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        /* Buttons styling */
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            text-decoration: none;
            background: white;
            color: black;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: transform 0.2s, opacity 0.2s, border-color 0.2s, background-color 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .secondary {
            background: transparent;
            color: white;
            border: 1px solid #3a3a3a;
        }

        .secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #555;
        }

        .social-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .social-row .button {
            flex: 1;
        }

        /* --- Clients Showcase Section --- */
        .portfolio-section {
            max-width: 450px;
            width: 100%;
            background: rgba(24, 24, 24, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .portfolio-section h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e5e7eb;
            margin-bottom: 25px;
        }

        .client-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .client-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 12px;
            font-weight: 500;
            color: #d1d5db;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            cursor: pointer;
        }

        .client-item:hover {
            background: rgba(185, 28, 28, 0.15);
            border-color: rgba(185, 28, 28, 0.3);
            transform: translateY(-2px);
        }

        .client-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
        }

        footer {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-benefits {
            color: #7a7a7a;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .footer-copyright {
            color: #555;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="particle-container" id="particleContainer"></div>

    <div class="card">
        <h1>jxnn.</h1>

        <p>
            Video Editor specialising in YouTube videos, 
            Shorts and TikTok content.
        </p>

        <a class="button sound-trigger" href="https://ibb.co/XZD7k6g7" target="_blank">
            <i class="fa-solid fa-tags"></i> View My Rates
        </a>

        <a class="button secondary sound-trigger" href="https://discord.gg/dUQGtpwSe" target="_blank">
            <i class="fa-brands fa-discord"></i> Contact Me
        </a>

        <div class="social-row">
            <a class="button secondary sound-trigger" href="https://instagram.com/jaxongarforth1" target="_blank">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a class="button secondary sound-trigger" href="https://x.com/jxnn122" target="_blank">
                <i class="fa-brands fa-x-twitter"></i> X / Twitter
            </a>
        </div>

        <footer>
            <div class="footer-benefits">Fast turnaround • Quality edits • Reliable communication</div>
            <div class="footer-copyright">© 2026 jxnn. All rights reserved.</div>
        </footer>
    </div>

    <div class="portfolio-section">
        <h2>Past Clients & Work</h2>
        
        <div class="client-grid">
            <a class="client-item sound-trigger" href="https://twitch.tv/okharry" target="_blank">
                <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/a6a4dfdb-5f34-4331-8796-bcae505aa8e6-profile_image-300x300.png" alt="OkHarry" class="client-avatar">
                <span>OkHarry</span>
            </a>

            <a class="client-item sound-trigger" href="https://www.youtube.com/@BetaSquad" target="_blank">
                <img src="https://yt3.googleusercontent.com/ytc/AIdro_keJoAmv1MrHOIplkYaZok_WuOdiHDTBv8Gv4xlmnOrLzk=s900-c-k-c0x00ffffff-no-rj" alt="Beta Squad" class="client-avatar">
                <span>Beta Squad</span>
            </a>
        </div>
    </div>

    <script>
        const clickSound = new Audio("https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/button_click.mp3");
        clickSound.volume = 0.4;

        document.querySelectorAll('.sound-trigger').forEach(element => {
            element.addEventListener('click', () => {
                try {
                    clickSound.currentTime = 0;
                    clickSound.play().catch(err => console.log("Audio waiting for interaction gesture."));
                } catch(e) {
                    console.log("Audio failed cleanly:", e);
                }
            });
        });

        window.addEventListener('scroll', () => {
            const scrollPercent = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            document.body.style.setProperty('--scroll-pos', `0% ${scrollPercent}%`);
        });

        function createParticles() {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 5 + 2;
                const leftPos = Math.random() * 100;
                const delay = Math.random() * 12;
                const speed = Math.random() * 8 + 6;
                const drift = (Math.random() * 60) - 30;
                const opacity = Math.random() * 0.5 + 0.2;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${leftPos}%`;
                
                particle.style.setProperty('--speed', `${speed}s`);
                particle.style.setProperty('--drift', `${drift}px`);
                particle.style.setProperty('--opacity', opacity);
                particle.style.animationDelay = `${delay}s`;

                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
