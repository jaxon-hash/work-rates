<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    /* 🔥 cinematic background */
    background: radial-gradient(circle at top, #1a0000 0%, #0a0a0a 40%, #000000 100%);
}

/* subtle red glow overlay */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, rgba(255,0,0,0.15), transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(255,0,0,0.08), transparent 45%);
    pointer-events: none;
    z-index: 0;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 25px;
    border-bottom: 1px solid rgba(255,0,0,0.2);
    z-index: 1000;
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
}

nav a:hover {
    color: red;
}

/* SECTIONS (fix empty space issue) */
section {
    min-height: auto;          /* 🔥 removes huge blank space */
    padding: 120px 20px;
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 1;
}

.container {
    max-width: 900px;
    width: 100%;
}

/* HERO */
.hero {
    text-align: center;
    padding-top: 180px;
    padding-bottom: 120px;
}

.hero h1 {
    font-size: 4rem;
    margin: 0;
    text-shadow: 0 0 20px rgba(255,0,0,0.4);
}

.hero p {
    color: #bbb;
}

/* CARDS */
.card {
    background: rgba(20, 20, 20, 0.7);
    border: 1px solid rgba(255,0,0,0.2);
    padding: 25px;
    border-radius: 15px;
    margin-top: 20px;
    backdrop-filter: blur(8px);
}

/* PRICING */
.price {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #222;
    color: #ccc;
}

/* CLIENT GRID */
.clients {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.client {
    background: rgba(10,10,10,0.8);
    border: 1px solid rgba(255,0,0,0.15);
    padding: 20px;
    text-align: center;
    border-radius: 12px;
    color: #bbb;
}

/* BUTTON */
.button {
    display: inline-block;
    background: linear-gradient(90deg, red, darkred);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 15px;
    box-shadow: 0 0 15px rgba(255,0,0,0.3);
    transition: 0.2s;
}

.button:hover {
    transform: scale(1.03);
}
</style>
