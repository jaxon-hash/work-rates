<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jxnn. | Video Editor</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #150505 50%, #300505 100%);
            background-size: 100% 200%;
            background-position: var(--scroll-pos, 0% 0%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            animation: breatheBackground 12s ease-in-out infinite alternate;
            transition: background-position 0.2s ease-out;
            position: relative;
        }

        @keyframes breatheBackground {
            0% { background-size: 100% 180%; }
            100% { background-size: 100% 220%; }
        }

        /* --- Particle System Styles --- */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            background: rgba(239, 68, 68, 0.4);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
            animation: floatUp var(--speed) linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: var(--opacity);
            }
            90% {
                opacity: var(--opacity);
            }
            100% {
                transform: translateY(-110vh) translateX(var(--drift));
                opacity: 0;
            }
        }

        .card, .portfolio-section {
            position: relative;
            z-index: 1;
        }

        /* Main Profile Container Card */
        .card {
            max-width: 450px;
            width: 100%;
            background: rgba(24, 24, 24, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: #b5b5b5;
            line-height: 1.6;
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        /* Buttons styling */
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            text-decoration: none;
            background: white;
            color: black;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: transform 0.2s, opacity 0.2s, border-color 0.2s, background-color 0.2s
