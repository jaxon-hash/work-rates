<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jxnn. | THUMBNAILS</title>

    <link rel="preload" as="image" href="assets/profile.png">
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png">
    <meta name="description" content="Thumbnail design portfolio by jxnn. studio.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
/* Text Selection Highlight */
::selection {
    background: #9dff00; /* Neon Green */
    color: #000000;
}
/* ==========================
   CORE SITE LAYOUT
========================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial Black', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background-color: #e2e2e2;
    background-image: 
        radial-gradient(rgba(0,0,0,0.15) 1px, transparent 0),
        radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
    background-size: 8px 8px;
    background-position: 0 0, 4px 4px;
    color: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 120px 20px 60px;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    opacity: 0.04;
    pointer-events: none;
    z-index: 9999;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}

/* ==========================
   PRELOADER
========================== */
#preloader {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background-color: #e2e2e2;
    z-index: 99999;
    transform: translateZ(0);
    will-change: transform;
    transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
    display: flex;
    justify-content: center;
    align-items: center;
}

.loader-card {
    background: #ffffff;
    border: 4px solid #000000;
    padding: 35px 45px;
    box-shadow: 10px 10px 0px #000000;
    text-align: center;
    transform: rotate(-2deg) translateZ(0);
    max-width: 90vw;
}

.loader-logo {
    font-size: 3.5rem;
    font-weight: 900;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 4px 4px 0px #000000;
    letter-spacing: -2px;
    line-height: 0.95;
    margin-bottom: 18px;
}

.loader-status {
    font-family: monospace;
    font-weight: 900;
    font-size: 0.95rem;
    color: #000000;
    background: #9dff00;
    border: 2px solid #000000;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 6px 14px;
    box-shadow: 3px 3px 0px #000000;
}

.loader-dot {
    width: 12px;
    height: 12px;
    background: #ffffff;
    border: 2px solid #000000;
    animation: blink 0.5s infinite alternate;
}

@keyframes blink {
    0% { opacity: 0.15; }
    100% { opacity: 1; }
}

#preloader.loaded {
    transform: translateY(-100vh) translateZ(0);
}

/* ==========================
   NAVIGATION
========================== */
.navbar {
    position: absolute;
    top: 0; left: 0; width: 100%;
    padding: 24px;
    z-index: 1000;
}
.nav-content {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.nav-logo-wrapper {
    display: flex;
    align-items: center;
    background: #fff;
    padding: 4px 12px;
    border: 3px solid #000;
    box-shadow: 4px 4px 0px #000;
    transform: rotate(-3deg);
    text-decoration: none;
}
.nav-logo-img {
    width: 24px;
    height: 24px;
    object-fit: cover;
    margin-right: 6px;
    border-radius: 2px;
}
.nav-logo-text {
    font-size: 1.4rem;
    color: #000;
    font-weight: 900;
}
.nav-links-group {
    display: flex;
    gap: 12px;
}
.nav-link {
    background: #000;
    color: #fff;
    text-decoration: none;
    padding: 8px 16px;
    font-size: 0.9rem;
    text-transform: uppercase;
    border: 2px solid #000;
    box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
}
.nav-link:hover, .nav-link.active {
    background: #9dff00;
    color: #000;
}

.container {
    max-width: 900px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 35px;
}

h1 {
    font-size: 3.5rem;
    font-weight: 900;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 4px 4px 0px #000000;
    letter-spacing: -2px;
    transform: rotate(-1deg);
    margin-bottom: 10px;
}

/* ==========================
   THUMBNAIL SHOWCASE GRID
========================== */
.thumbnail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    width: 100%;
}

.thumb-card {
    background: #ffffff;
    border: 4px solid #000000;
    box-shadow: 6px 6px 0px #000000;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    flex-direction: column;
}

.thumb-card:hover {
    transform: translate(-4px, -4px);
    box-shadow: 10px 10px 0px #000000;
}

.thumb-img-wrapper {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #111;
    border-bottom: 4px solid #000;
    overflow: hidden;
    position: relative;
}

.thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.thumb-card:hover .thumb-img {
    transform: scale(1.02);
}

.thumb-details {
    padding: 14px;
    background: #fff;
}

.thumb-client {
    font-size: 1.1rem;
    color: #000;
    text-transform: uppercase;
    margin-bottom: 4px;
}

.thumb-meta {
    font-family: monospace;
    font-weight: bold;
    font-size: 0.85rem;
    color: #555;
    background: #9dff00;
    border: 2px solid #000;
    display: inline-block;
    padding: 2px 6px;
    box-shadow: 2px 2px 0px #000;
}

/* ==========================
   LIGHTBOX MODAL PROTOCOL
========================== */
.lightbox {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0, 0, 0, 0.92);
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.lightbox-content {
    max-width: 90%;
    max-height: 80vh;
    border: 6px solid #000;
    box-shadow: 12px 12px 0px #9dff00;
    background: #000;
}

.lightbox-content img {
    width: 100%;
    height: auto;
    max-height: 75vh;
    object-fit: contain;
    display: block;
}

.lightbox-close {
    position: absolute;
    top: 24px; right: 24px;
    background: #9dff00;
    border: 3px solid #000;
    color: #000;
    width: 46px; height: 46px;
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 4px 4px 0px #000;
}
.lightbox-close:hover { background: #fff; }

footer { text-align: center; font-family: monospace; font-weight: bold; font-size: 0.85rem; margin-top: 40px; }
footer a { color: #000; text-decoration: underline; }

@media (max-width: 500px) {
    h1 { font-size: 2.6rem; }
    .thumbnail-grid { grid-template-columns: 1fr; }
    .nav-content { flex-direction: column; gap: 16px; }
}
</style>
</head>
<body>

<div id="preloader">
    <div class="loader-card">
        <div class="loader-logo">JXNN. STUDIO</div>
        <div class="loader-status">
            <div class="loader-dot"></div>
            <span>LOADING DESIGN LAYER...</span>
        </div>
    </div>
</div>

<nav class="navbar">
    <div class="nav-content">
        <a href="./" class="nav-logo-wrapper">
            <img src="assets/profile.png" alt="Logo Icon" class="nav-logo-img">
            <span class="nav-logo-text">JXNN.</span>
        </a>
        <div class="nav-links-group">
            <a href="./" class="nav-link">HOME</a>
            <a href="thumbnails.html" class="nav-link active">THUMBNAILS</a>
            <a href="faq.html" class="nav-link">FAQ</a>
        </div>
    </div>
</nav>

<main class="container">
    <header>
        <h1>THUMBNAILS</h1>
    </header>

    <section class="thumbnail-grid">
        <!-- ITEM 1 -->
        <div class="thumb-card" data-fullsrc="assets/raft.jpg">
            <div class="thumb-img-wrapper">
                <img src="assets/raft.jpg" alt="OkHarry Thumbnail" class="thumb-img" loading="lazy">
            </div>
            <div class="thumb-details">
                <div class="thumb-client">BETA SQUAD</div>
                <div class="thumb-meta">CTR: 11.4% // 4M+ VIEWS</div>
            </div>
        </div>

        <!-- ITEM 2 -->
        <div class="thumb-card" data-fullsrc="assets/camping.jpg">
            <div class="thumb-img-wrapper">
                <img src="assets/camping.jpg" alt="OkHarry Thumbnail" class="thumb-img" loading="lazy">
            </div>
            <div class="thumb-details">
                <div class="thumb-client">OKHARRY</div>
                <div class="thumb-meta">RETENTION FOCUSED COVERS</div>
            </div>
        </div>

        <!-- ITEM 3 -->
        <div class="thumb-card" data-fullsrc="assets/ww2.jpg">
            <div class="thumb-img-wrapper">
                <img src="assets/ww2.jpg" alt="OkHarry Thumbnail="thumb-img" loading="lazy">
            </div>
            <div class="thumb-details">
                <div class="thumb-client">CONCEPT WORK</div>
                <div class="thumb-meta">AGGRESSIVE FRAMING PROTOCOL</div>
            </div>
        </div>
        
        <!-- Add more thumbnail cards here following the exact same div layout format! -->
    </section>

    <footer>
        <div>© 2026 JXNN. STUDIO • <a href="tos.html?v=100">TERMS</a></div>
    </footer>
</main>

<!-- Lightbox Core System Display -->
<div id="lightbox" class="lightbox">
    <button class="lightbox-close" id="closeLightbox" aria-label="Close Gallery"><i class="fa-solid fa-xmark"></i></button>
    <div class="lightbox-content">
        <img id="lightboxImg" src="" alt="Expanded Thumbnail View">
    </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const preloader = document.getElementById("preloader");
    setTimeout(() => {
        preloader.classList.add("loaded");
        setTimeout(() => { preloader.remove(); }, 600);
    }, 800);
}, { passive: true });

// Lightbox Passive Execution Script
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const closeLightbox = document.getElementById("closeLightbox");
const cards = document.querySelectorAll(".thumb-card");

cards.forEach(card => {
    card.addEventListener("click", () => {
        const highResSrc = card.dataset.fullsrc;
        lightboxImg.src = highResSrc;
        lightbox.style.display = "flex";
    }, { passive: true });
});

closeLightbox.addEventListener("click", () => { lightbox.style.display = "none"; }, { passive: true });
lightbox.addEventListener("click", (e) => { if (e.target === lightbox) lightbox.style.display = "none"; }, { passive: true });
</script>
</body>
</html>
