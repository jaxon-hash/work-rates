<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Cut | jxnn.</title>
    
    <meta name="description" content="Oops! This page got edited out of the timeline.">
    <meta property="og:title" content="404 - Lost in the Cut | jxnn.">
    <meta property="og:image" content="assets/favicon.jpg">

    <link rel="icon" type="image/png" href="assets/favicon.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* ==========================
           SELECTION
        ========================== */

        ::selection{
            background:#ef4444;
            color:#fff;
        }

        ::-moz-selection{
            background:#ef4444;
            color:#fff;
        }

        html {
            min-height: 100%;
            background: #0a0a0a;
            background-image: linear-gradient(180deg, #0a0a0a 0%, #1a0808 50%, #4a0a0a 100%);
            background-size: 100% 100%;
            background-attachment: scroll;
            overflow: hidden;
        }

        body {
            min-height: 100vh;
            background: transparent;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.08) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -1;
        }

        /* --- Particle System Styles --- */
        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            left: -50px;
            background: rgba(239, 68, 68, 0.4);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
            animation: driftAcross404 var(--speed) linear infinite;
        }

        @keyframes driftAcross404 {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: var(--opacity); }
            90% { opacity: var(--opacity); }
            100% { transform: translateX(110vw) translateY(var(--y-drift)); opacity: 0; }
        }

        /* --- Error Card Layout --- */
        .error-card {
            position: relative;
            z-index: 1;
            max-width: min(95%, 800px);
            width: 100%;
            background: rgba(24, 24, 24, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            position: relative;
            font-size: 8rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        .error-code::before,
        .error-code::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.8;
        }

        .error-code::before {
            animation: glitch 650ms infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-0.025em, -0.0125em);
            color: #ef4444;
        }

        .error-code::after {
            animation: glitch 375ms infinite;
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            transform: translate(0.0125em, 0.025em);
            color: #44efef;
        }

        @keyframes glitch {
            0% {
                text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                            -0.05em -0.025em 0 rgba(0, 255, 0, 0.75),
                            -0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            }
            14% {
                text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                            -0.05em -0.025em 0 rgba(0, 255, 0, 0.75),
                            -0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            }
            15% {
                text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75),
                            0.025em 0.025em 0 rgba(0, 255, 0, 0.75),
                            -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            49% {
                text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75),
                            0.025em 0.025em 0 rgba(0, 255, 0, 0.75),
                            -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            50% {
                text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75),
                            0.05em 0 0 rgba(0, 255, 0, 0.75),
                            0 -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            99% {
                text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75),
                            0.05em 0 0 rgba(0, 255, 0, 0.75),
                            0 -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            100% {
                text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75),
                            -0.025em -0.025em 0 rgba(0, 255, 0, 0.75),
                            -0.025em -0.05em 0 rgba(0, 0, 255, 0.75);
            }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: #b5b5b5;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Home Navigation Action Button */
        .home-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            text-decoration: none;
            background: white;
            color: black;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
        }

        .home-button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.6), 0 0 10px rgba(239, 68, 68, 0.3);
        }

        footer {
            margin-top: 30px;
            color: #555;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        footer a { color: inherit; text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: #ef4444; }

        /* ==========================
           LOADER
        ========================== */
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
        }

        .loader-wrapper.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loader-logo {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -2px;
            margin-bottom: 10px;
            animation: loaderText 2s ease-in-out infinite;
            text-align: center;
        }

        .loader-bar {
            width: 60px;
            height: 3px;
            background: #ef4444;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            animation: loaderBar 1.5s infinite ease-in-out;
        }

        @keyframes loaderText {
            0%, 100% { opacity: 0.8; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes loaderBar {
            0% { width: 0; opacity: 0; }
            50% { width: 80px; opacity: 1; }
            100% { width: 0; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="loader-wrapper" id="loader">
        <div>
            <div class="loader-logo">jxnn.</div>
            <div class="loader-bar"></div>
        </div>
    </div>

    <div class="particle-container" id="particleContainer"></div>

    <div class="error-card">
        <div class="error-code">404</div>
        <h1>Lost in the Cut?</h1>
        <p>The timeline snapped or this page got edited out entirely. Let's get you back to safety.</p>
        
        <a class="home-button" href="./">
            <i class="fa-solid fa-house"></i> Back to Portfolio Hub
        </a>

        <footer>© 2026 <a href="https://github.com/jaxon-hash" target="_blank" rel="noopener noreferrer">jxnn</a>. All rights reserved. • <a href="tos.html">Terms of Service</a></footer>
    </div>

    <script>
        /* Clean URL for 404 Page */
        if (window.location.protocol !== 'file:') {
            window.history.replaceState(null, null, '/404');
        }

        /* Page Loader */
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader");
            setTimeout(() => {
                loader.classList.add("fade-out");
            }, 400);
        });

        // Dynamic Upward Particle Engine
        function createParticles() {
            const container = document.getElementById('particleContainer');
            if (!container) return;
            const particleCount = 35;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.top = `${Math.random() * 110 - 5}%`;
                particle.style.left = `-50px`;

                particle.style.setProperty('--speed', `${Math.random() * 10 + 8}s`);
                particle.style.setProperty('--y-drift', `${Math.random() * 200 - 100}px`);
                particle.style.setProperty('--opacity', Math.random() * 0.5 + 0.2);
                particle.style.animationDelay = `${Math.random() * 12}s`;

                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
