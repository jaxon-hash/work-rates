<!DOCTYPE html>

  <link rel="icon" type="image/png" href="assets/favicon.png">

        <div class="eyebrow">Sequence missing</div>

        <div class="button-row"><a class="button primary" href="./">Back to the studio ↗</a><a class="button" href="mailto:business.jxnn@gmail.com">Report a problem</a></div>

    </div>
