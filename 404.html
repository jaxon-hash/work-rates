/* ==========================

========================== */
* {

body {

/* ==========================
   CONTAINER & ERROR GRAPHICS
========================== */
.error-container {
    max-width: 500px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 30px;
    text-align: center;

h1 {
    font-size: 5.5rem;

.status-card {
    background: #ffffff;
    border: 4px solid #000000;
    padding: 30px 24px;
    box-shadow: 8px 8px 0px #000000;
    position: relative;
}

.status-card h2 {
    font-size: 1.3rem;
    text-transform: uppercase;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
}

.status-card p {
    font-family: monospace;
    font-weight: bold;
    font-size: 0.9rem;
    color: #444444;
    line-height: 1.5;
    background: #f0f0f0;
    padding: 12px;
    border: 2px dashed #000;
}

/* ==========================
   TACTILE CTA STICKER
========================== */
.sticker-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: #9dff00;
    border: 4px solid #000000;
    color: #000000;
    font-size: 1.1rem;
    font-weight: 900;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 6px 6px 0px #000000;
    transition: transform 0.05s ease, box-shadow 0.05s ease;
}

.sticker-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0px #000000;
}

.sticker-btn:active {
    transform: translate(6px, 6px);
    box-shadow: 0px 0px 0px #000000;
}

footer {

    font-weight: bold;
    font-size: 0.85rem;
    color: #000;
}

@media (max-width: 500px) {
    h1 { font-size: 4rem; letter-spacing: -2px; }
